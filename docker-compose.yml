version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis_postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_dev
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - aegis_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    command: redis-server --appendonly yes --appendfsync everysec
    # appendonly yes  — AOF persistence: no silent audit loss on restart
    # appendfsync everysec — durability/performance balance for audit buffer
    ports:
      - "6379:6379"
    volumes:
      - aegis_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  aegis_postgres_data:
  aegis_redis_data: